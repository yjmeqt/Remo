name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  test:
    name: Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  swift-test:
    name: Swift Integration Test (arm64 sim)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - name: Build simulator XCFramework
        run: ./build-ios.sh sim
      - name: Run Swift tests
        env:
          REMO_LOCAL: "1"
        run: |
          xcodebuild test \
            -workspace examples/ios/RemoExample.xcworkspace \
            -scheme RemoExample \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -skipPackagePluginValidation

  build-ios:
    name: Build iOS (device + x86_64 sim)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios
      - run: cargo build -p remo-sdk --features ios --target aarch64-apple-ios --release
      - run: cargo build -p remo-sdk --features ios --target x86_64-apple-ios --release
