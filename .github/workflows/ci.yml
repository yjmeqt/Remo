name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  swift-test:
    name: Swift Integration Test (arm64 sim)
    needs: check
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          key: ios-sim
      - name: Cache Xcode DerivedData & SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: xcode-${{ hashFiles('examples/ios/RemoExamplePackage/Package.swift') }}-${{ github.sha }}
          restore-keys: |
            xcode-${{ hashFiles('examples/ios/RemoExamplePackage/Package.swift') }}-
            xcode-
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: Boot simulator & build XCFramework
        run: |
          xcrun simctl boot 'iPhone 17' 2>/dev/null || true
          ./build-ios.sh sim
      - name: Run Swift tests
        env:
          REMO_LOCAL: "1"
        run: |
          run_tests() {
            xcodebuild test \
              -workspace examples/ios/RemoExample.xcworkspace \
              -scheme RemoExample \
              -destination 'platform=iOS Simulator,name=iPhone 17' \
              -skipPackagePluginValidation 2>&1 | xcbeautify --is-ci
          }
          if ! run_tests; then
            echo "==> Build/test failed, clearing caches and retrying..."
            rm -rf ~/Library/Developer/Xcode/DerivedData
            rm -rf ~/Library/Caches/org.swift.swiftpm
            run_tests
          fi

  build-ios:
    name: Build iOS (device + x86_64 sim)
    needs: check
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          key: ios-cross
      - run: cargo build -p remo-sdk --features ios --target aarch64-apple-ios --release
      - run: cargo build -p remo-sdk --features ios --target x86_64-apple-ios --release
