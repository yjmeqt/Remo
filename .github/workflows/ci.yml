name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  e2e:
    name: E2E (Simulator)
    needs: check
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo
      - name: Cache Xcode DerivedData & SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: xcode-e2e-${{ hashFiles('examples/ios/RemoExamplePackage/Package.swift') }}-${{ github.sha }}
          restore-keys: |
            xcode-e2e-${{ hashFiles('examples/ios/RemoExamplePackage/Package.swift') }}-
            xcode-e2e-
      - name: Boot simulator
        run: xcrun simctl boot 'iPhone 17' 2>/dev/null || true
      - name: Run E2E tests
        run: ./scripts/e2e-test.sh --screenshots --record
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: /tmp/remo-e2e/
          retention-days: 14
