name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release SDK And CLI
    runs-on: macos-26
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios, aarch64-apple-darwin, x86_64-apple-darwin

      - name: Build XCFramework
        run: ./build-ios.sh release

      - name: Package release zip
        run: |
          cp LICENSE swift/
          cd swift
          zip -r ../RemoSDK.xcframework.zip \
            RemoSDK.xcframework \
            RemoSwift/Sources/RemoSwift \
            RemoSwift/Sources/RemoObjC \
            Remo.podspec \
            LICENSE

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum RemoSDK.xcframework.zip)
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "Checksum: ${CHECKSUM}"

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build CLI binaries
        run: |
          cargo build -p remo-cli --release --target aarch64-apple-darwin
          cargo build -p remo-cli --release --target x86_64-apple-darwin

      - name: Package CLI release artifacts
        run: |
          mkdir -p dist/cli
          bash scripts/package-cli-release.sh \
            --version "${{ steps.version.outputs.version }}" \
            --input target/aarch64-apple-darwin/release/remo \
            --target aarch64-apple-darwin \
            --output-dir dist/cli
          bash scripts/package-cli-release.sh \
            --version "${{ steps.version.outputs.version }}" \
            --input target/x86_64-apple-darwin/release/remo \
            --target x86_64-apple-darwin \
            --output-dir dist/cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            RemoSDK.xcframework.zip
            dist/cli/remo-macos-arm64.tar.gz
            dist/cli/remo-macos-x86_64.tar.gz
            dist/cli/checksums.txt
            scripts/install-remo.sh
            scripts/uninstall-remo.sh
          body: |
            ## RemoSDK ${{ github.ref_name }}

            ### Swift Package Manager

            Via [remo-spm](https://github.com/yjmeqt/remo-spm):
            ```swift
            .package(url: "https://github.com/yjmeqt/remo-spm.git", from: "${{ steps.version.outputs.version }}")
            ```

            ### Checksums

            | File | SHA-256 |
            |------|---------|
            | RemoSDK.xcframework.zip | `${{ steps.checksum.outputs.checksum }}` |
          generate_release_notes: true

      # Auto-update remo-spm with new URL + checksum and tag the release.
      - name: Update remo-spm
        env:
          SPM_TOKEN: ${{ secrets.SPM_REPO_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          set -euo pipefail

          RELEASE_URL="https://github.com/yjmeqt/Remo/releases/download/${TAG}/RemoSDK.xcframework.zip"

          # Clone remo-spm
          git clone "https://x-access-token:${SPM_TOKEN}@github.com/yjmeqt/remo-spm.git" /tmp/remo-spm
          cd /tmp/remo-spm

          # Sync Package.swift from source, replacing local path with remote URL + checksum
          cp "$GITHUB_WORKSPACE/swift/RemoSwift/Package.swift" Package.swift
          python3 -c 'import re,sys; url=sys.argv[1]; cs=sys.argv[2]; p="Package.swift"; s=open(p).read(); s=re.sub(r"""\.binaryTarget\(\s*name:\s*"CRemo",\s*path:\s*"[^"]*"\s*\)""", f".binaryTarget(name: \"CRemo\", url: \"{url}\", checksum: \"{cs}\")", s); open(p,"w").write(s)' "$RELEASE_URL" "$CHECKSUM"

          # Update README.md version references
          sed -i '' "s|from: \"[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\"|from: \"${VERSION}\"|g" \
              README.md
          sed -i '' "s|pod 'Remo[^']*', '~> [0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*'|pod 'Remo', '~> ${VERSION}'|g" \
              README.md

          # Sync Swift + ObjC source
          cp "$GITHUB_WORKSPACE/swift/RemoSwift/Sources/RemoSwift/Remo.swift" \
             Sources/RemoSwift/Remo.swift

          mkdir -p Sources/RemoObjC/include
          cp "$GITHUB_WORKSPACE/swift/RemoSwift/Sources/RemoObjC/include/RMRemo.h" \
             Sources/RemoObjC/include/RMRemo.h
          cp "$GITHUB_WORKSPACE/swift/RemoSwift/Sources/RemoObjC/RMRemo.m" \
             Sources/RemoObjC/RMRemo.m

          # Sync podspec
          cp "$GITHUB_WORKSPACE/swift/Remo.podspec" \
             Remo.podspec

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to remo-spm, skipping."
          else
            git commit -m "Update to ${TAG}"
            git tag "${VERSION}"
            git push origin main
            git push origin "${VERSION}"
            echo "remo-spm updated and tagged ${VERSION}"
          fi

      - name: Update homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          ARM64_SHA="$(awk '/remo-macos-arm64.tar.gz$/ {print $1}' dist/cli/checksums.txt)"
          X86_SHA="$(awk '/remo-macos-x86_64.tar.gz$/ {print $1}' dist/cli/checksums.txt)"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yjmeqt/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          mkdir -p Formula

          bash "$GITHUB_WORKSPACE/scripts/render-homebrew-formula.sh" \
            --version "${VERSION}" \
            --repo "yjmeqt/Remo" \
            --arm64-sha "${ARM64_SHA}" \
            --x86-sha "${X86_SHA}" \
            > Formula/remo.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/remo.rb

          if git diff --cached --quiet; then
            echo "No changes to homebrew-tap, skipping."
          else
            git commit -m "Update remo to v${VERSION}"
            git push origin main
            echo "homebrew-tap updated to v${VERSION}"
          fi
