<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remo Dashboard</title>
<style>
/* =========================================================================
   Reset & Variables
   ========================================================================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #09090b;
  --panel: #0c0c0e;
  --surface: #18181b;
  --accent: #27272a;
  --highlight: #fafafa;
  --text: #fafafa;
  --text-dim: #71717a;
  --border: #27272a;
  --green: #22c55e;
  --red: #ef4444;
  --muted: #a1a1aa;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius: 8px;
  --transition: 0.15s ease;
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* =========================================================================
   Layout
   ========================================================================= */
body {
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text);
}

.logo span {
  font-weight: 700;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #555;
  display: inline-block;
  transition: background var(--transition);
}

.status-dot.online {
  background: var(--green);
  box-shadow: 0 0 4px var(--green);
}

.status-dot.offline {
  background: var(--red);
  box-shadow: 0 0 4px var(--red);
}

/* Device selector dropdown */
.device-selector {
  position: relative;
}

.device-selector-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  min-width: 180px;
}

.device-selector-btn:hover {
  border-color: #3f3f46;
}

.device-selector-btn .chevron {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-dim);
}

.device-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  min-width: 280px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  z-index: 50;
  overflow: hidden;
}

.device-dropdown.open {
  display: block;
}

.device-dropdown-header {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}

.device-list {
  max-height: 240px;
  overflow-y: auto;
}

.device-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  transition: background var(--transition);
  border-bottom: 1px solid var(--border);
}

.device-item:last-child {
  border-bottom: none;
}

.device-item:hover {
  background: var(--accent);
}

.device-item.connected {
  background: rgba(34, 197, 94, 0.08);
}

.device-item .device-transport {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--accent);
  color: var(--text-dim);
  flex-shrink: 0;
}

.device-item .device-name {
  flex: 1;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.device-item .device-addr {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--mono);
}

.device-item .device-connected-badge {
  font-size: 10px;
  color: var(--green);
  flex-shrink: 0;
}

.device-scanning {
  padding: 12px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}

.device-empty {
  padding: 12px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}

main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 380px;
  overflow: hidden;
  min-height: 0;
}

.left-column {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

/* =========================================================================
   Player Area
   ========================================================================= */
.player-area {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  overflow: hidden;
  min-height: 0;
  flex: 1;
}

.phone-frame {
  position: relative;
  height: 100%;
  aspect-ratio: 9 / 19.5;
  max-width: 100%;
  overflow: hidden;
  background: #000;
}

.phone-frame video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
  display: none;
}

.phone-frame video.visible {
  display: block;
}

.phone-frame {
  position: relative;
}

.player-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 5;
}

#placeholder-overlay {
  background: rgba(9, 9, 11, 0.85);
  color: var(--text-dim);
  font-size: 14px;
  gap: 12px;
}

#placeholder-overlay .device-icon {
  width: 50px;
  height: 90px;
  border: 2px solid var(--text-dim);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

#stopped-overlay {
  background: rgba(0, 0, 0, 0.6);
  display: none;
}

#stopped-overlay .stopped-badge {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid var(--red);
  color: var(--red);
  padding: 8px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.phone-frame #shutter-flash {
  position: absolute;
  inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 8;
}

@keyframes flash {
  0%   { opacity: 0; }
  30%  { opacity: 0.8; }
  100% { opacity: 0; }
}

/* Screenshot strip (below video, above terminal) */
.screenshot-strip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  min-height: 0;
}

.screenshot-strip .btn-capture {
  flex-shrink: 0;
  width: auto;
  padding: 4px 12px;
  font-size: 12px;
}

.screenshot-strip .thumbnail-container {
  flex: 1;
  padding: 0;
  min-width: 0;
}

.screenshot-strip .no-screenshots {
  padding: 0;
  font-size: 11px;
}

/* Screenshot preview overlay — full page */
#screenshot-preview {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(12px);
}

#screenshot-preview img {
  max-width: 85%;
  max-height: 85%;
  object-fit: contain;
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
}

#screenshot-preview .close-btn {
  position: absolute;
  top: 20px;
  right: 24px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}

#screenshot-preview .close-btn:hover {
  background: rgba(255, 255, 255, 0.2);
}

#screenshot-preview.visible {
  display: flex;
}

/* Player stats overlay */
.player-stats {
  position: absolute;
  top: 8px;
  left: 8px;
  font: 12px/1.4 var(--mono);
  color: #aaa;
  background: rgba(0, 0, 0, 0.6);
  padding: 4px 8px;
  border-radius: 4px;
  z-index: 6;
  pointer-events: none;
  display: none;
}

.player-stats.visible {
  display: block;
}

/* =========================================================================
   Control Panel
   ========================================================================= */
.control-panel {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: var(--bg);
  border-left: 1px solid var(--border);
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}

.control-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.control-section:last-child {
  border-bottom: none;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 10px;
}

/* Mirror controls */
.mirror-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.fps-display {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text);
  background: var(--surface);
  outline: none;
}

.btn:hover:not(:disabled) {
  background: var(--accent);
  border-color: #3f3f46;
}

.btn:active:not(:disabled) {
  background: #333;
}

.btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.btn-start {
  background: var(--text);
  color: var(--bg);
  border-color: transparent;
}

.btn-start:hover:not(:disabled) {
  background: #d4d4d8;
  border-color: transparent;
}

.btn-stop {
  background: var(--red);
  color: #fff;
  border-color: transparent;
}

.btn-stop:hover:not(:disabled) {
  background: #dc2626;
  border-color: transparent;
}

.btn-capture {
  background: var(--surface);
  width: 100%;
  justify-content: center;
}

.btn-call {
  background: var(--text);
  color: var(--bg);
  border-color: transparent;
  padding: 5px 12px;
  font-size: 12px;
}

.btn-call:hover:not(:disabled) {
  background: #d4d4d8;
  border-color: transparent;
}

.btn-small {
  padding: 3px 8px;
  font-size: 11px;
  border-radius: 4px;
}

/* Screenshots */
.thumbnail-container {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 0 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}

.thumbnail-container::-webkit-scrollbar {
  height: 5px;
}

.thumbnail-container::-webkit-scrollbar-track {
  background: transparent;
}

.thumbnail-container::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 3px;
}

.thumbnail-item {
  position: relative;
  flex-shrink: 0;
  width: 48px;
  height: 100px;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: border-color var(--transition);
}

.thumbnail-item:hover {
  border-color: #52525b;
}

.thumbnail-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumbnail-item .thumb-actions {
  position: absolute;
  bottom: 0;
  right: 0;
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
}

.thumbnail-item:hover .thumb-actions {
  opacity: 1;
}

.thumb-actions a,
.thumb-actions button {
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  border: none;
  padding: 2px 5px;
  font-size: 10px;
  cursor: pointer;
  text-decoration: none;
}

.thumb-actions a:hover,
.thumb-actions button:hover {
  background: #52525b;
}

.no-screenshots {
  color: var(--text-dim);
  font-size: 12px;
  padding: 8px 0;
}

/* Capabilities */
#capabilities-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}

#capabilities-list::-webkit-scrollbar {
  width: 5px;
}

#capabilities-list::-webkit-scrollbar-track {
  background: transparent;
}

#capabilities-list::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 3px;
}

.cap-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color var(--transition);
}

.cap-card:hover {
  border-color: #3f3f46;
}

.cap-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  cursor: pointer;
  user-select: none;
}

.cap-card-header .cap-name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.cap-card-header .cap-toggle {
  font-size: 10px;
  color: var(--text-dim);
  transition: transform var(--transition);
}

.cap-card.expanded .cap-toggle {
  transform: rotate(90deg);
}

.cap-card-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.2s ease;
  overflow: hidden;
}

.cap-card.expanded .cap-card-body {
  grid-template-rows: 1fr;
}

.cap-card-body-inner {
  overflow: hidden;
  padding: 0 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cap-card textarea {
  width: 100%;
  height: 56px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 12px;
  resize: vertical;
  outline: none;
  transition: border-color var(--transition);
}

.cap-card textarea:focus {
  border-color: #52525b;
}

.cap-card .cap-actions {
  display: flex;
  justify-content: flex-end;
}

.cap-card .cap-result {
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 8px;
  background: var(--bg);
  border-radius: 6px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 120px;
  overflow-y: auto;
  display: none;
}

.cap-card .cap-result.visible {
  display: block;
}

.cap-card .cap-result.success {
  color: var(--muted);
  border-left: 3px solid #3f3f46;
}

.cap-card .cap-result.error {
  color: var(--red);
  border-left: 3px solid var(--red);
}

.cap-loading {
  color: var(--text-dim);
  font-size: 12px;
  padding: 8px 0;
}

/* =========================================================================
   Terminal — sits below video in left column
   ========================================================================= */
#terminal {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-top: 1px solid var(--border);
  height: 200px;
  min-height: 80px;
  flex-shrink: 0;
}

#terminal-resize {
  height: 3px;
  background: var(--border);
  cursor: ns-resize;
  flex-shrink: 0;
  transition: background var(--transition);
}

#terminal-resize:hover {
  background: #52525b;
}

#terminal-output {
  flex: 1;
  overflow-y: auto;
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
  min-height: 0;
}

#terminal-output::-webkit-scrollbar {
  width: 5px;
}

#terminal-output::-webkit-scrollbar-track {
  background: transparent;
}

#terminal-output::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 3px;
}

.term-line {
  display: flex;
  gap: 8px;
  padding: 1px 0;
}

.term-time {
  color: #555;
  flex-shrink: 0;
}

.term-prefix {
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.term-content {
  white-space: pre-wrap;
  word-break: break-all;
  flex: 1;
}

.term-request .term-prefix { color: #71717a; }
.term-request .term-content { color: #a1a1aa; }

.term-response .term-prefix { color: #d4d4d8; }
.term-response .term-content { color: #d4d4d8; }

.term-error .term-prefix { color: var(--red); }
.term-error .term-content { color: var(--red); }

.term-event .term-prefix { color: #71717a; }
.term-event .term-content { color: #a1a1aa; }

.term-system .term-prefix { color: #52525b; }
.term-system .term-content { color: #52525b; }

.terminal-input-row {
  display: flex;
  align-items: center;
  padding: 6px 16px 8px;
  gap: 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.terminal-input-row .prompt {
  color: #71717a;
  font-family: var(--mono);
  font-size: 13px;
  flex-shrink: 0;
}

#terminal-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
}

#terminal-input::placeholder {
  color: #444;
}

.btn-send {
  background: var(--text);
  color: var(--bg);
  border-color: transparent;
  padding: 4px 12px;
  font-size: 12px;
}

.btn-send:hover:not(:disabled) {
  background: #d4d4d8;
  border-color: transparent;
}

/* =========================================================================
   Responsive
   ========================================================================= */
@media (max-width: 768px) {
  main {
    grid-template-columns: 1fr;
    grid-template-rows: 40vh 1fr;
  }

  .left-column {
    min-height: 40vh;
  }

  .control-panel {
    border-left: none;
    border-top: 1px solid var(--border);
  }
}
</style>
</head>
<body>

<!-- ======================================================================
     Header
     ====================================================================== -->
<header>
  <div class="logo"><span>Remo</span> Dashboard</div>
  <div class="header-right">
    <div id="device-selector" class="device-selector">
      <button id="device-selector-btn" class="device-selector-btn" onclick="toggleDeviceDropdown()">
        <span id="status-dot" class="status-dot"></span>
        <span id="device-info">No device</span>
        <span class="chevron">&#x25BE;</span>
      </button>
      <div id="device-dropdown" class="device-dropdown">
        <div class="device-dropdown-header">Devices</div>
        <div id="device-list" class="device-list">
          <div class="device-scanning">Scanning...</div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ======================================================================
     Main Content
     ====================================================================== -->
<main>
  <!-- Left Column: Video + Terminal -->
  <div class="left-column">
    <div class="player-area">
      <div class="phone-frame">
        <video id="video" autoplay muted playsinline></video>

        <div id="placeholder-overlay" class="player-overlay">
          <div class="device-icon">&#x1F4F1;</div>
          <div id="placeholder-device-name">Waiting for device...</div>
        </div>

        <div id="stopped-overlay" class="player-overlay">
          <div class="stopped-badge">Stream Stopped</div>
        </div>

        <div id="shutter-flash"></div>
      </div>

      <div id="player-stats" class="player-stats">
        FPS: 0  Frames: 0
      </div>
    </div>

    <!-- Screenshot Strip -->
    <div class="screenshot-strip">
      <button class="btn btn-capture" onclick="captureScreenshot()">Capture</button>
      <div id="thumbnail-container" class="thumbnail-container">
        <div class="no-screenshots" id="no-screenshots">No screenshots yet</div>
      </div>
    </div>

    <!-- Terminal -->
    <div id="terminal">
      <div id="terminal-resize"></div>
      <div id="terminal-output"></div>
      <div class="terminal-input-row">
        <span class="prompt">&gt;</span>
        <input id="terminal-input" type="text" placeholder="call capability_name {&quot;key&quot;: &quot;value&quot;}" autocomplete="off" spellcheck="false">
        <button class="btn btn-send" onclick="sendTerminalCommand()">Send</button>
      </div>
    </div>
  </div>

  <!-- Right Column: Controls -->
  <div class="control-panel">
    <!-- Mirror Section -->
    <div class="control-section">
      <div class="section-title">Mirror</div>
      <div class="mirror-controls">
        <button id="btn-start" class="btn btn-start" onclick="startMirror()">&#x25B6; Start</button>
        <button id="btn-stop" class="btn btn-stop" onclick="stopMirror()" disabled>&#x23F9; Stop</button>
        <div class="fps-display">
          <span id="fps-value">0</span> fps
        </div>
      </div>
    </div>

    <!-- Capabilities Section -->
    <div class="control-section">
      <div class="section-title">Capabilities</div>
      <div id="capabilities-list">
        <div class="cap-loading">Loading capabilities...</div>

<script>
"use strict";

// ===========================================================================
// Flag constants for the binary frame protocol
// ===========================================================================
const KEYFRAME     = 0x01;
const STREAM_START = 0x02;
const STREAM_END   = 0x04;
const CODEC_CONFIG = 0x08;

// ===========================================================================
// DOM references
// ===========================================================================
const videoEl = document.getElementById("video");
const placeholderOverlay = document.getElementById("placeholder-overlay");
const stoppedOverlay = document.getElementById("stopped-overlay");
const shutterFlash = document.getElementById("shutter-flash");
const screenshotPreview = document.getElementById("screenshot-preview");
const screenshotPreviewImg = document.getElementById("screenshot-preview-img");
const playerStats = document.getElementById("player-stats");
const terminalOutput = document.getElementById("terminal-output");
const terminalInput = document.getElementById("terminal-input");
const btnStart = document.getElementById("btn-start");
const btnStop = document.getElementById("btn-stop");
const fpsValueEl = document.getElementById("fps-value");
const thumbnailContainer = document.getElementById("thumbnail-container");
const noScreenshots = document.getElementById("no-screenshots");

// ===========================================================================
// State
// ===========================================================================
let mediaSource = null;
let sourceBuffer = null;
let appendQueue = [];
let appending = false;
let seqNum = 0;
let frameCount = 0;
let fpsFrameCount = 0;
let fps = 0;
let lastFpsTime = performance.now();
let streamWs = null;
let codecString = "";
let pendingFrames = []; // frames buffered while sourceBuffer is not ready
let mirroring = false;
let screenshotCount = 0;

// Device connection state
let connectedDeviceId = null;
let connectedDeviceName = null;
let knownDevices = []; // [{id, name, transport, addr}]
let deviceDropdownOpen = false;
let devicePollTimer = null;

// Terminal state
let commandHistory = [];
let historyIndex = -1;

// ===========================================================================
// MP4 box helpers
// (copied from battle-tested player.html implementation)
// ===========================================================================
function box(type, ...payloads) {
  let size = 8;
  for (const p of payloads) size += p.byteLength;
  const out = new Uint8Array(size);
  const dv = new DataView(out.buffer);
  dv.setUint32(0, size);
  out[4] = type.charCodeAt(0);
  out[5] = type.charCodeAt(1);
  out[6] = type.charCodeAt(2);
  out[7] = type.charCodeAt(3);
  let offset = 8;
  for (const p of payloads) {
    out.set(p instanceof Uint8Array ? p : new Uint8Array(p), offset);
    offset += p.byteLength;
  }
  return out;
}

function fullbox(type, version, flags, ...payloads) {
  const header = new Uint8Array(4);
  header[0] = version;
  header[1] = (flags >> 16) & 0xff;
  header[2] = (flags >> 8) & 0xff;
  header[3] = flags & 0xff;
  return box(type, header, ...payloads);
}

function u8(v)  { return new Uint8Array([v]); }
function u16(v) { const b = new Uint8Array(2); new DataView(b.buffer).setUint16(0, v); return b; }
function u32(v) { const b = new Uint8Array(4); new DataView(b.buffer).setUint32(0, v); return b; }
function u64(v) {
  const b = new Uint8Array(8);
  const dv = new DataView(b.buffer);
  dv.setUint32(0, Math.floor(v / 0x100000000));
  dv.setUint32(4, v >>> 0);
  return b;
}
function zeros(n) { return new Uint8Array(n); }
function concat(...arrays) {
  let len = 0;
  for (const a of arrays) len += a.byteLength;
  const out = new Uint8Array(len);
  let off = 0;
  for (const a of arrays) { out.set(a, off); off += a.byteLength; }
  return out;
}

// ===========================================================================
// Annex-B NAL splitter
// (copied from battle-tested player.html implementation)
// ===========================================================================
function splitNals(data) {
  const nals = [];
  let i = 0;
  let start = -1;

  function isStartCode(pos) {
    if (pos + 3 < data.length &&
        data[pos] === 0 && data[pos+1] === 0 && data[pos+2] === 0 && data[pos+3] === 1) {
      return 4;
    }
    if (pos + 2 < data.length &&
        data[pos] === 0 && data[pos+1] === 0 && data[pos+2] === 1) {
      return 3;
    }
    return 0;
  }

  while (i < data.length) {
    const sc = isStartCode(i);
    if (sc > 0) {
      if (start >= 0) {
        nals.push(data.subarray(start, i));
      }
      i += sc;
      start = i;
    } else {
      i++;
    }
  }
  if (start >= 0 && start < data.length) {
    nals.push(data.subarray(start, data.length));
  }
  return nals;
}

// ===========================================================================
// Exp-Golomb / SPS parser
// (copied from battle-tested player.html implementation)
// ===========================================================================
class BitReader {
  constructor(data) {
    this.data = data;
    this.bytePos = 0;
    this.bitPos = 0;
  }
  readBit() {
    if (this.bytePos >= this.data.length) return 0;
    const bit = (this.data[this.bytePos] >> (7 - this.bitPos)) & 1;
    this.bitPos++;
    if (this.bitPos === 8) { this.bitPos = 0; this.bytePos++; }
    return bit;
  }
  readBits(n) {
    let val = 0;
    for (let i = 0; i < n; i++) {
      val = (val << 1) | this.readBit();
    }
    return val;
  }
  readUEG() {
    let zeros = 0;
    while (this.readBit() === 0 && zeros < 31) zeros++;
    if (zeros === 0) return 0;
    return (1 << zeros) - 1 + this.readBits(zeros);
  }
  readSEG() {
    const val = this.readUEG();
    if (val === 0) return 0;
    return (val & 1) ? ((val + 1) >>> 1) : -((val + 1) >>> 1);
  }
  skipScalingList(size) {
    let lastScale = 8;
    let nextScale = 8;
    for (let j = 0; j < size; j++) {
      if (nextScale !== 0) {
        const delta = this.readSEG();
        nextScale = (lastScale + delta + 256) % 256;
      }
      lastScale = (nextScale === 0) ? lastScale : nextScale;
    }
  }
}

// Remove emulation prevention bytes (0x00 0x00 0x03 -> 0x00 0x00)
function removeEpb(data) {
  const out = [];
  let i = 0;
  while (i < data.length) {
    if (i + 2 < data.length && data[i] === 0 && data[i+1] === 0 && data[i+2] === 3) {
      out.push(0, 0);
      i += 3;
    } else {
      out.push(data[i]);
      i++;
    }
  }
  return new Uint8Array(out);
}

function parseSPS(nalUnit) {
  // Strip NAL header byte
  const rbsp = removeEpb(nalUnit.subarray(1));
  const br = new BitReader(rbsp);

  const profile_idc = br.readBits(8);
  const constraint_set_flags = br.readBits(8);
  const level_idc = br.readBits(8);
  br.readUEG(); // seq_parameter_set_id

  let chroma_format_idc = 1;
  let separate_colour_plane_flag = 0;
  let bit_depth_luma = 8;
  let bit_depth_chroma = 8;

  if (profile_idc === 100 || profile_idc === 110 || profile_idc === 122 ||
      profile_idc === 244 || profile_idc === 44  || profile_idc === 83  ||
      profile_idc === 86  || profile_idc === 118 || profile_idc === 128 ||
      profile_idc === 138 || profile_idc === 139 || profile_idc === 134 ||
      profile_idc === 135) {
    chroma_format_idc = br.readUEG();
    if (chroma_format_idc === 3) {
      separate_colour_plane_flag = br.readBits(1);
    }
    bit_depth_luma = br.readUEG() + 8;
    bit_depth_chroma = br.readUEG() + 8;
    br.readBits(1); // qpprime_y_zero_transform_bypass_flag
    const seq_scaling_matrix_present = br.readBits(1);
    if (seq_scaling_matrix_present) {
      const limit = (chroma_format_idc !== 3) ? 8 : 12;
      for (let i = 0; i < limit; i++) {
        const present = br.readBits(1);
        if (present) {
          br.skipScalingList(i < 6 ? 16 : 64);
        }
      }
    }
  }

  br.readUEG(); // log2_max_frame_num_minus4
  const pic_order_cnt_type = br.readUEG();
  if (pic_order_cnt_type === 0) {
    br.readUEG(); // log2_max_pic_order_cnt_lsb_minus4
  } else if (pic_order_cnt_type === 1) {
    br.readBits(1);
    br.readSEG();
    br.readSEG();
    const n = br.readUEG();
    for (let i = 0; i < n; i++) br.readSEG();
  }

  br.readUEG(); // max_num_ref_frames
  br.readBits(1); // gaps_in_frame_num_value_allowed_flag

  const pic_width_in_mbs_minus1 = br.readUEG();
  const pic_height_in_map_units_minus1 = br.readUEG();
  const frame_mbs_only_flag = br.readBits(1);

  if (!frame_mbs_only_flag) {
    br.readBits(1); // mb_adaptive_frame_field_flag
  }

  br.readBits(1); // direct_8x8_inference_flag

  let cropLeft = 0, cropRight = 0, cropTop = 0, cropBottom = 0;
  const frame_cropping_flag = br.readBits(1);
  if (frame_cropping_flag) {
    cropLeft   = br.readUEG();
    cropRight  = br.readUEG();
    cropTop    = br.readUEG();
    cropBottom = br.readUEG();
  }

  let subWidthC = 1, subHeightC = 1;
  if (chroma_format_idc === 1) { subWidthC = 2; subHeightC = 2; }
  else if (chroma_format_idc === 2) { subWidthC = 2; subHeightC = 1; }
  else if (chroma_format_idc === 3 && separate_colour_plane_flag === 0) { subWidthC = 1; subHeightC = 1; }

  const cropUnitX = (chroma_format_idc === 0) ? 1 : subWidthC;
  const cropUnitY = (chroma_format_idc === 0) ? (2 - frame_mbs_only_flag) : subHeightC * (2 - frame_mbs_only_flag);

  const width  = (pic_width_in_mbs_minus1 + 1) * 16 - cropUnitX * (cropLeft + cropRight);
  const height = (2 - frame_mbs_only_flag) * (pic_height_in_map_units_minus1 + 1) * 16 - cropUnitY * (cropTop + cropBottom);

  return {
    profile_idc,
    profile_compat: constraint_set_flags,
    level_idc,
    width,
    height,
    chroma_format_idc,
  };
}

// ===========================================================================
// Codec string from SPS info
// (copied from battle-tested player.html implementation)
// ===========================================================================
function makeCodecString(spsInfo) {
  const p = spsInfo.profile_idc.toString(16).padStart(2, "0");
  const c = spsInfo.profile_compat.toString(16).padStart(2, "0");
  const l = spsInfo.level_idc.toString(16).padStart(2, "0");
  return `avc1.${p}${c}${l}`;
}

// ===========================================================================
// fMP4 init segment builder
// (copied from battle-tested player.html implementation)
// ===========================================================================
function buildInitSegment(sps, pps) {
  const spsInfo = parseSPS(sps);
  const w = spsInfo.width;
  const h = spsInfo.height;

  codecString = `video/mp4; codecs="${makeCodecString(spsInfo)}"`;
  console.log("Codec:", codecString, `${w}x${h}`);

  const avcC = box("avcC", new Uint8Array([
    1,
    sps[1],
    sps[2],
    sps[3],
    0xff,
    0xe1,
    (sps.length >> 8) & 0xff, sps.length & 0xff,
    ...sps,
    1,
    (pps.length >> 8) & 0xff, pps.length & 0xff,
    ...pps,
  ]));

  const avc1Payload = concat(
    zeros(6),
    u16(1),
    zeros(16),
    u16(w),
    u16(h),
    u32(0x00480000),
    u32(0x00480000),
    zeros(4),
    u16(1),
    zeros(32),
    u16(0x0018),
    new Uint8Array([0xff, 0xff]),
    avcC,
  );
  const avc1 = box("avc1", avc1Payload);

  const stsd = fullbox("stsd", 0, 0, u32(1), avc1);
  const stts = fullbox("stts", 0, 0, u32(0));
  const stsc = fullbox("stsc", 0, 0, u32(0));
  const stsz = fullbox("stsz", 0, 0, u32(0), u32(0));
  const stco = fullbox("stco", 0, 0, u32(0));
  const stbl = box("stbl", stsd, stts, stsc, stsz, stco);

  const vmhd = fullbox("vmhd", 0, 1, zeros(8));
  const url  = fullbox("url ", 0, 1);
  const dref = fullbox("dref", 0, 0, u32(1), url);
  const dinf = box("dinf", dref);
  const minf = box("minf", vmhd, dinf, stbl);

  const mdhd = fullbox("mdhd", 0, 0,
    u32(0), u32(0), u32(90000), u32(0),
    u16(0x55c4), u16(0),
  );

  const hdlr = fullbox("hdlr", 0, 0,
    u32(0),
    new Uint8Array([0x76,0x69,0x64,0x65]),
    zeros(12),
    new Uint8Array([0x56,0x69,0x64,0x65,0x6f,0x48,0x61,0x6e,0x64,0x6c,0x65,0x72,0x00]),
  );

  const mdia = box("mdia", mdhd, hdlr, minf);

  const tkhd = fullbox("tkhd", 0, 3,
    u32(0), u32(0), u32(1), u32(0), u32(0),
    zeros(8), u16(0), u16(0), u16(0), u16(0),
    new Uint8Array([
      0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00, 0x40,0x00,0x00,0x00,
    ]),
    u16(w), u16(0),
    u16(h), u16(0),
  );

  const trak = box("trak", tkhd, mdia);

  const mvhd = fullbox("mvhd", 0, 0,
    u32(0), u32(0), u32(90000), u32(0),
    u32(0x00010000),
    u16(0x0100),
    zeros(10),
    new Uint8Array([
      0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00, 0x40,0x00,0x00,0x00,
    ]),
    zeros(24),
    u32(2),
  );

  const trex = fullbox("trex", 0, 0,
    u32(1), u32(1), u32(0), u32(0), u32(0),
  );
  const mvex = box("mvex", trex);

  const moov = box("moov", mvhd, trak, mvex);

  const ftyp = box("ftyp",
    new Uint8Array([0x69,0x73,0x6f,0x6d]),
    u32(0x200),
    new Uint8Array([
      0x69,0x73,0x6f,0x6d,
      0x69,0x73,0x6f,0x32,
      0x61,0x76,0x63,0x31,
      0x6d,0x70,0x34,0x31,
    ]),
  );

  return concat(ftyp, moov);
}

// ===========================================================================
// fMP4 media segment builder
// (copied from battle-tested player.html implementation)
// ===========================================================================
function buildMediaSegment(nalData, timestampUs, isKeyframe, seq) {
  const nals = splitNals(nalData);
  let avccSize = 0;
  for (const nal of nals) avccSize += 4 + nal.length;
  const avccData = new Uint8Array(avccSize);
  const avccDv = new DataView(avccData.buffer);
  let off = 0;
  for (const nal of nals) {
    avccDv.setUint32(off, nal.length);
    avccData.set(nal, off + 4);
    off += 4 + nal.length;
  }

  const dts90k = Math.floor(timestampUs * 90 / 1000);

  const sampleFlags = isKeyframe ? 0x02000000 : 0x01010000;
  const sampleDuration = 3000;

  const trunFlags = 0x000701;
  const trunPayload = concat(
    u32(1),
    u32(0),
    u32(sampleDuration),
    u32(avccData.length),
    u32(sampleFlags),
  );
  const trun = fullbox("trun", 0, trunFlags, trunPayload);

  const tfhd = fullbox("tfhd", 0, 0x020000,
    u32(1),
  );

  const tfdt = fullbox("tfdt", 1, 0, u64(dts90k));

  const traf = box("traf", tfhd, tfdt, trun);

  const mfhd = fullbox("mfhd", 0, 0, u32(seq));
  const moof = box("moof", mfhd, traf);

  const mdat = box("mdat", avccData);

  const mfhdSize = 8 + 4 + 4;
  const tfhdSize = 8 + 4 + 4;
  const tfdtSize = 8 + 4 + 8;
  const trunDataOffsetPos = 8 + mfhdSize + 8 + tfhdSize + tfdtSize + 8 + 4 + 4;
  const dv = new DataView(moof.buffer);
  dv.setUint32(trunDataOffsetPos, moof.length + 8);

  return concat(moof, mdat);
}

// ===========================================================================
// Frame parser
// (copied from battle-tested player.html implementation)
// ===========================================================================
function parseFrame(buffer) {
  const data = new Uint8Array(buffer);
  if (data.length < 9) return null;
  const flags = data[0];
  const dv = new DataView(buffer);
  const hi = dv.getUint32(1);
  const lo = dv.getUint32(5);
  const timestamp_us = hi * 0x100000000 + lo;
  const nalData = data.subarray(9);
  return { flags, timestamp_us, nalData };
}

// ===========================================================================
// MSE integration
// (copied from battle-tested player.html implementation)
// ===========================================================================
function resetMSE() {
  if (sourceBuffer) {
    try {
      if (mediaSource && mediaSource.readyState === "open") {
        mediaSource.removeSourceBuffer(sourceBuffer);
      }
    } catch (e) { /* ignore */ }
    sourceBuffer = null;
  }
  if (mediaSource) {
    try {
      if (mediaSource.readyState === "open") mediaSource.endOfStream();
    } catch (e) { /* ignore */ }
  }
  appendQueue = [];
  appending = false;
  seqNum = 0;
  pendingFrames = [];

  mediaSource = new MediaSource();
  videoEl.src = URL.createObjectURL(mediaSource);
}

function appendSegment(data) {
  appendQueue.push(data);
  drainQueue();
}

function drainQueue() {
  if (appending || !sourceBuffer || appendQueue.length === 0) return;
  if (sourceBuffer.updating) return;
  appending = true;
  const seg = appendQueue.shift();
  try {
    sourceBuffer.appendBuffer(seg);
    if (seqNum <= 3) termLog("system", `appendBuffer #${seqNum} (${seg.byteLength}B) queue=${appendQueue.length}`);
  } catch (e) {
    termLog("error", `appendBuffer: ${e.message}`);
    appending = false;
  }
}

function onUpdateEnd() {
  appending = false;

  if (sourceBuffer && !sourceBuffer.updating && sourceBuffer.buffered.length > 0) {
    const buffEnd = sourceBuffer.buffered.end(sourceBuffer.buffered.length - 1);
    const buffStart = sourceBuffer.buffered.start(0);
    if (buffEnd - buffStart > 30) {
      try {
        sourceBuffer.remove(buffStart, buffEnd - 15);
        return;
      } catch (e) { /* ignore */ }
    }
    // Keep playback near live edge
    if (videoEl.paused) {
      videoEl.play().catch(() => {});
    } else if (buffEnd - videoEl.currentTime > 2) {
      videoEl.currentTime = buffEnd - 0.5;
    }
  }

  drainQueue();
}

function initSourceBuffer(initSegment) {
  if (!mediaSource || mediaSource.readyState !== "open") {
    console.warn("MediaSource not open, deferring init");
    mediaSource.addEventListener("sourceopen", () => initSourceBuffer(initSegment), { once: true });
    return;
  }

  if (!MediaSource.isTypeSupported(codecString)) {
    console.error("Codec not supported:", codecString);
    termLog("error", "Unsupported codec: " + codecString);
    return;
  }

  try {
    sourceBuffer = mediaSource.addSourceBuffer(codecString);
  } catch (e) {
    termLog("error", `addSourceBuffer failed: ${e.message}`);
    return;
  }
  sourceBuffer.mode = "sequence";
  sourceBuffer.addEventListener("updateend", onUpdateEnd);
  sourceBuffer.addEventListener("error", (e) => termLog("error", `SourceBuffer error: ${e}`));

  appendSegment(initSegment);

  // Drain frames that arrived while we were waiting for sourceBuffer
  if (pendingFrames.length > 0) {
    termLog("system", `Draining ${pendingFrames.length} buffered frames`);
    for (const pf of pendingFrames) {
      seqNum++;
      frameCount++;
      fpsFrameCount++;
      const isKey = !!(pf.flags & KEYFRAME);
      const segment = buildMediaSegment(pf.nalData, pf.timestamp_us, isKey, seqNum);
      appendSegment(segment);
    }
    pendingFrames = [];
  }

  videoEl.play().catch(() => {});
}

// ===========================================================================
// Player state transitions
// ===========================================================================
function showPlaceholder() {
  videoEl.classList.remove("visible");
  placeholderOverlay.style.display = "flex";
  stoppedOverlay.style.display = "none";
  playerStats.classList.remove("visible");
}

function showLive() {
  videoEl.classList.add("visible");
  placeholderOverlay.style.display = "none";
  stoppedOverlay.style.display = "none";
  playerStats.classList.add("visible");
}

function showStopped() {
  videoEl.classList.add("visible");
  placeholderOverlay.style.display = "none";
  stoppedOverlay.style.display = "flex";
  playerStats.classList.remove("visible");
}

// ===========================================================================
// Stream WebSocket
// ===========================================================================
function handleCodecConfig(frame) {
  const nals = splitNals(frame.nalData);
  let sps = null, pps = null;
  for (const nal of nals) {
    if (nal.length === 0) continue;
    const nalType = nal[0] & 0x1f;
    if (nalType === 7) sps = nal;
    else if (nalType === 8) pps = nal;
  }
  if (!sps || !pps) {
    termLog("error", `No SPS/PPS found in codec config (${nals.length} NALs)`);
    return;
  }

  // Build the codec string to check if it changed
  const spsInfo = parseSPS(sps);
  const newCodec = `video/mp4; codecs="${makeCodecString(spsInfo)}"`;

  // Only reset MSE if codec changed or first time
  if (newCodec === codecString && sourceBuffer) {
    // Same codec, MSE already initialized — skip
    return;
  }

  termLog("system", `Codec: ${newCodec} (${spsInfo.width}x${spsInfo.height})`);
  resetMSE();
  const initSeg = buildInitSegment(sps, pps);

  if (mediaSource.readyState === "open") {
    initSourceBuffer(initSeg);
  } else {
    mediaSource.addEventListener("sourceopen", () => initSourceBuffer(initSeg), { once: true });
  }
}

function endStream() {
  console.log("Stream ended");
  try {
    if (mediaSource && mediaSource.readyState === "open" && sourceBuffer && !sourceBuffer.updating) {
      mediaSource.endOfStream();
    }
  } catch (e) { /* ignore */ }
}

function connectStream() {
  streamWs = new WebSocket(`ws://${location.host}/ws/stream`);
  streamWs.binaryType = "arraybuffer";

  streamWs.onmessage = (e) => {
    const frame = parseFrame(e.data);
    if (!frame) return;

    if (frame.flags & STREAM_END) {
      endStream();
      return;
    }

    if (frame.flags & CODEC_CONFIG) {
      handleCodecConfig(frame);
      return;
    }

    if (!sourceBuffer) {
      // Buffer frames while waiting for sourceBuffer to be ready
      pendingFrames.push(frame);
      return;
    }

    seqNum++;
    frameCount++;
    fpsFrameCount++;
    const isKey = !!(frame.flags & KEYFRAME);
    const segment = buildMediaSegment(frame.nalData, frame.timestamp_us, isKey, seqNum);
    appendSegment(segment);
  };

  streamWs.onclose = () => {
    console.log("Stream WebSocket closed");
  };

  streamWs.onerror = (e) => {
    console.error("Stream WebSocket error:", e);
  };
}

// ===========================================================================
// Mirror Controls
// ===========================================================================
async function startMirror() {
  btnStart.disabled = true;
  try {
    const resp = await fetch("/api/mirror/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fps: 30 }),
    });
    if (resp.ok) {
      mirroring = true;
      btnStop.disabled = false;
      frameCount = 0;
      fpsFrameCount = 0;
      fps = 0;
      showLive();
      connectStream();
      termLog("response", "Mirror started");
    } else if (resp.status === 409) {
      btnStart.disabled = false;
      termLog("error", "Mirror already active");
    } else {
      btnStart.disabled = false;
      termLog("error", `Failed to start mirror: ${resp.status}`);
    }
  } catch (e) {
    btnStart.disabled = false;
    termLog("error", `Failed to start mirror: ${e.message}`);
  }
}

async function stopMirror() {
  btnStop.disabled = true;
  try {
    const resp = await fetch("/api/mirror/stop", { method: "POST" });
    if (resp.ok) {
      mirroring = false;
      btnStart.disabled = false;
      if (streamWs) {
        streamWs.close();
        streamWs = null;
      }
      showStopped();
      termLog("response", "Mirror stopped");
    } else {
      btnStop.disabled = false;
      termLog("error", `Failed to stop mirror: ${resp.status}`);
    }
  } catch (e) {
    btnStop.disabled = false;
    termLog("error", `Failed to stop mirror: ${e.message}`);
  }
}

// ===========================================================================
// FPS counter
// ===========================================================================
setInterval(() => {
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = fpsFrameCount;
    fpsFrameCount = 0;
    lastFpsTime = now;
  }
  fpsValueEl.textContent = fps;
  if (mirroring) {
    playerStats.textContent = `FPS: ${fps}  Frames: ${frameCount}`;
  }
}, 1000);

// ===========================================================================
// Screenshots
// ===========================================================================
async function captureScreenshot() {
  // Flash shutter animation
  shutterFlash.style.animation = "flash 0.15s ease-out";
  setTimeout(() => { shutterFlash.style.animation = ""; }, 200);

  try {
    const resp = await fetch("/api/screenshot", { method: "POST" });
    if (resp.ok) {
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const w = resp.headers.get("X-Width");
      const h = resp.headers.get("X-Height");
      addThumbnail(url, w, h);
      termLog("response", `Screenshot captured (${w}x${h})`);
    } else {
      termLog("error", `Screenshot failed: ${resp.status}`);
    }
  } catch (e) {
    termLog("error", `Screenshot failed: ${e.message}`);
  }
}

function addThumbnail(url, width, height) {
  noScreenshots.style.display = "none";
  screenshotCount++;
  const num = screenshotCount;

  const item = document.createElement("div");
  item.className = "thumbnail-item";

  const img = document.createElement("img");
  img.src = url;
  img.alt = `Screenshot ${num}`;
  img.title = `${width}x${height}`;
  img.addEventListener("click", () => showScreenshotPreview(url));
  item.appendChild(img);

  const actions = document.createElement("div");
  actions.className = "thumb-actions";

  const downloadLink = document.createElement("a");
  downloadLink.href = url;
  downloadLink.download = `screenshot-${num}.jpg`;
  downloadLink.textContent = "\u2B07";
  downloadLink.title = "Download";
  actions.appendChild(downloadLink);

  const removeBtn = document.createElement("button");
  removeBtn.textContent = "\u2715";
  removeBtn.title = "Remove";
  removeBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    item.remove();
    URL.revokeObjectURL(url);
    if (thumbnailContainer.querySelectorAll(".thumbnail-item").length === 0) {
      noScreenshots.style.display = "";
    }
  });
  actions.appendChild(removeBtn);

  item.appendChild(actions);
  thumbnailContainer.appendChild(item);

  // Scroll to end
  thumbnailContainer.scrollLeft = thumbnailContainer.scrollWidth;
}

function showScreenshotPreview(url) {
  screenshotPreviewImg.src = url;
  screenshotPreview.classList.add("visible");
}

function hideScreenshotPreview() {
  screenshotPreview.classList.remove("visible");
  screenshotPreviewImg.src = "";
}

screenshotPreview.addEventListener("click", (e) => {
  if (e.target === screenshotPreview) hideScreenshotPreview();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && screenshotPreview.classList.contains("visible")) {
    hideScreenshotPreview();
  }
});

// ===========================================================================
// Capabilities Panel
// ===========================================================================
async function loadCapabilities() {
  const container = document.getElementById("capabilities-list");
  try {
    const resp = await fetch("/api/capabilities");
    if (!resp.ok) {
      container.innerHTML = '<div class="cap-loading">Failed to load capabilities</div>';
      return;
    }
    const allCaps = await resp.json();
    // Filter out internal capabilities (prefixed with __)
    const caps = allCaps.filter(c => !c.startsWith("__"));
    container.innerHTML = "";
    if (caps.length === 0) {
      container.innerHTML = '<div class="cap-loading">No capabilities available</div>';
      return;
    }
    caps.forEach((name) => container.appendChild(createCapCard(name)));
  } catch (e) {
    container.innerHTML = '<div class="cap-loading">Failed to load capabilities</div>';
  }
}

function createCapCard(name) {
  const card = document.createElement("div");
  card.className = "cap-card";

  // Header
  const header = document.createElement("div");
  header.className = "cap-card-header";
  header.addEventListener("click", () => card.classList.toggle("expanded"));

  const nameSpan = document.createElement("span");
  nameSpan.className = "cap-name";
  nameSpan.textContent = name;
  header.appendChild(nameSpan);

  const toggleSpan = document.createElement("span");
  toggleSpan.className = "cap-toggle";
  toggleSpan.textContent = "\u25B6";
  header.appendChild(toggleSpan);

  card.appendChild(header);

  // Body
  const body = document.createElement("div");
  body.className = "cap-card-body";

  const inner = document.createElement("div");
  inner.className = "cap-card-body-inner";

  const textarea = document.createElement("textarea");
  textarea.placeholder = '{"key": "value"}';
  textarea.spellcheck = false;
  inner.appendChild(textarea);

  const actions = document.createElement("div");
  actions.className = "cap-actions";

  const callBtn = document.createElement("button");
  callBtn.className = "btn btn-call";
  callBtn.textContent = "Call";
  callBtn.addEventListener("click", () => callCapability(name, textarea, result));
  actions.appendChild(callBtn);
  inner.appendChild(actions);

  const result = document.createElement("div");
  result.className = "cap-result";
  inner.appendChild(result);

  body.appendChild(inner);
  card.appendChild(body);

  return card;
}

async function callCapability(name, textarea, resultEl) {
  let params = {};
  const raw = textarea.value.trim();
  if (raw) {
    try {
      params = JSON.parse(raw);
    } catch (e) {
      resultEl.className = "cap-result visible error";
      resultEl.textContent = "Invalid JSON: " + e.message;
      termLog("error", `Invalid JSON for ${name}: ${e.message}`);
      return;
    }
  }

  termLog("request", `call ${name} ${raw || "{}"}`);

  try {
    const resp = await fetch("/api/call", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, params }),
    });
    const data = await resp.json();

    if (data.status === "ok") {
      const formatted = JSON.stringify(data.data, null, 2);
      resultEl.className = "cap-result visible success";
      resultEl.textContent = formatted;
      termLog("response", formatted);
    } else {
      const errMsg = `Error ${data.code || ""}: ${data.error || "Unknown error"}`;
      resultEl.className = "cap-result visible error";
      resultEl.textContent = errMsg;
      termLog("error", errMsg);
    }
  } catch (e) {
    const errMsg = `Request failed: ${e.message}`;
    resultEl.className = "cap-result visible error";
    resultEl.textContent = errMsg;
    termLog("error", errMsg);
  }
}

// ===========================================================================
// Terminal
// ===========================================================================
function termLog(type, message) {
  const line = document.createElement("div");
  line.className = `term-line term-${type}`;

  const time = document.createElement("span");
  time.className = "term-time";
  const now = new Date();
  time.textContent = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}:${String(now.getSeconds()).padStart(2, "0")}`;
  line.appendChild(time);

  const prefix = document.createElement("span");
  prefix.className = "term-prefix";
  switch (type) {
    case "request":  prefix.textContent = ">"; break;
    case "response": prefix.textContent = "\u2190"; break;
    case "error":    prefix.textContent = "\u2717"; break;
    case "event":    prefix.textContent = "\u2605"; break;
    case "system":   prefix.textContent = "\u2022"; break;
    default:         prefix.textContent = " "; break;
  }
  line.appendChild(prefix);

  const content = document.createElement("span");
  content.className = "term-content";
  content.textContent = message;
  line.appendChild(content);

  terminalOutput.appendChild(line);
  terminalOutput.scrollTop = terminalOutput.scrollHeight;
}

function setupTerminal() {
  terminalInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendTerminalCommand();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (commandHistory.length > 0) {
        if (historyIndex < commandHistory.length - 1) {
          historyIndex++;
        }
        terminalInput.value = commandHistory[commandHistory.length - 1 - historyIndex];
      }
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        terminalInput.value = commandHistory[commandHistory.length - 1 - historyIndex];
      } else {
        historyIndex = -1;
        terminalInput.value = "";
      }
    }
  });
}

async function sendTerminalCommand() {
  const raw = terminalInput.value.trim();
  if (!raw) return;

  terminalInput.value = "";
  commandHistory.push(raw);
  historyIndex = -1;

  // Parse command: "call <name> [json]" or "<name> [json]"
  let name, paramsStr;
  const callMatch = raw.match(/^call\s+(\S+)\s*(.*)?$/i);
  if (callMatch) {
    name = callMatch[1];
    paramsStr = (callMatch[2] || "").trim();
  } else {
    // Shorthand: first word is name, rest is JSON
    const parts = raw.match(/^(\S+)\s*(.*)?$/);
    if (parts) {
      name = parts[1];
      paramsStr = (parts[2] || "").trim();
    } else {
      termLog("error", "Invalid command");
      return;
    }
  }

  let params = {};
  if (paramsStr) {
    try {
      params = JSON.parse(paramsStr);
    } catch (e) {
      termLog("error", `Invalid JSON: ${e.message}`);
      return;
    }
  }

  termLog("request", `call ${name} ${paramsStr || "{}"}`);

  try {
    const resp = await fetch("/api/call", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, params }),
    });
    const data = await resp.json();

    if (data.status === "ok") {
      termLog("response", JSON.stringify(data.data, null, 2));
    } else {
      termLog("error", `Error ${data.code || ""}: ${data.error || "Unknown error"}`);
    }
  } catch (e) {
    termLog("error", `Request failed: ${e.message}`);
  }
}

// ===========================================================================
// Terminal Resize
// ===========================================================================
function setupTerminalResize() {
  const resizeHandle = document.getElementById("terminal-resize");
  const terminal = document.getElementById("terminal");
  let startY = 0;
  let startHeight = 0;
  let dragging = false;

  resizeHandle.addEventListener("mousedown", (e) => {
    e.preventDefault();
    dragging = true;
    startY = e.clientY;
    startHeight = terminal.offsetHeight;
    document.body.style.cursor = "ns-resize";
    document.body.style.userSelect = "none";
  });

  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newHeight = Math.max(80, Math.min(window.innerHeight * 0.7, startHeight + delta));
    terminal.style.height = newHeight + "px";
  });

  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  });
}

// ===========================================================================
// Device Discovery & Connection
// ===========================================================================

function toggleDeviceDropdown() {
  deviceDropdownOpen = !deviceDropdownOpen;
  document.getElementById("device-dropdown").classList.toggle("open", deviceDropdownOpen);
  if (deviceDropdownOpen) refreshDeviceList();
}

// Close dropdown when clicking outside
document.addEventListener("click", (e) => {
  if (deviceDropdownOpen && !e.target.closest(".device-selector")) {
    deviceDropdownOpen = false;
    document.getElementById("device-dropdown").classList.remove("open");
  }
});

async function refreshDeviceList() {
  try {
    const resp = await fetch("/api/devices");
    if (!resp.ok) return;
    knownDevices = await resp.json();
    renderDeviceList();
  } catch { /* ignore */ }
}

function renderDeviceList() {
  const list = document.getElementById("device-list");
  if (knownDevices.length === 0) {
    list.innerHTML = '<div class="device-empty">No devices found</div>';
    return;
  }
  list.innerHTML = "";
  for (const dev of knownDevices) {
    const item = document.createElement("div");
    item.className = "device-item" + (dev.id === connectedDeviceId ? " connected" : "");
    item.onclick = () => connectToDevice(dev.id, dev.name);

    const transport = document.createElement("span");
    transport.className = "device-transport";
    transport.textContent = dev.transport;
    item.appendChild(transport);

    const name = document.createElement("span");
    name.className = "device-name";
    name.textContent = dev.name;
    item.appendChild(name);

    if (dev.addr) {
      const addr = document.createElement("span");
      addr.className = "device-addr";
      addr.textContent = dev.addr;
      item.appendChild(addr);
    }

    if (dev.id === connectedDeviceId) {
      const badge = document.createElement("span");
      badge.className = "device-connected-badge";
      badge.textContent = "Connected";
      item.appendChild(badge);
    }

    list.appendChild(item);
  }
}

async function connectToDevice(deviceId, deviceName) {
  deviceDropdownOpen = false;
  document.getElementById("device-dropdown").classList.remove("open");

  if (deviceId === connectedDeviceId) return; // already connected

  termLog("system", `Connecting to ${deviceName}...`);
  document.getElementById("device-info").textContent = "Connecting...";

  try {
    const resp = await fetch("/api/connect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: deviceId }),
    });
    if (!resp.ok) {
      const text = await resp.text();
      termLog("error", `Connection failed (${resp.status}): ${text}`);
      return;
    }
    const data = await resp.json();
    connectedDeviceId = deviceId;
    connectedDeviceName = deviceName;
    onDeviceConnected();
  } catch (e) {
    termLog("error", `Connection failed [${e.constructor.name}]: ${e.message}`);
    console.error("connectToDevice error:", e);
  }
}

async function onDeviceConnected() {
  document.getElementById("status-dot").className = "status-dot online";

  // Load device info
  try {
    const info = await (await fetch("/api/info")).json();
    const deviceName = info.device?.name || connectedDeviceName || "Unknown";
    const appName = info.app?.display_name || "";
    document.getElementById("device-info").textContent = `${deviceName} \u00B7 ${appName}`;
    document.getElementById("placeholder-device-name").textContent = deviceName;
  } catch {
    document.getElementById("device-info").textContent = connectedDeviceName || "Connected";
  }

  await loadCapabilities();
  termLog("system", `Connected to ${connectedDeviceName}`);
}

function onDeviceDisconnected(reason) {
  const wasConnected = connectedDeviceId !== null;
  connectedDeviceId = null;
  connectedDeviceName = null;

  document.getElementById("status-dot").className = "status-dot offline";
  document.getElementById("device-info").textContent = "No device";

  // Reset mirror state
  if (mirroring) {
    mirroring = false;
    btnStart.disabled = false;
    btnStop.disabled = true;
  }

  // Clear capabilities
  const capList = document.getElementById("capabilities-list");
  capList.innerHTML = '<div class="cap-loading">Connect a device to see capabilities</div>';

  if (wasConnected) {
    termLog("system", `Device disconnected${reason ? ": " + reason : ""}`);
    showPlaceholder();
  }
}

// Poll for new devices periodically
function startDevicePolling() {
  refreshDeviceList();
  devicePollTimer = setInterval(refreshDeviceList, 3000);
}

// ===========================================================================
// Events WebSocket
// ===========================================================================
function connectEvents() {
  const ws = new WebSocket(`ws://${location.host}/ws/events`);
  let retryDelay = 1000;

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      const kind = data.kind || "";

      // Handle device discovery events
      if (kind === "device.added") {
        refreshDeviceList();
        termLog("system", `Device found: ${data.payload?.name || "unknown"}`);
        return;
      }
      if (kind === "device.removed") {
        refreshDeviceList();
        const removedId = data.payload?.id;
        if (removedId === connectedDeviceId) {
          onDeviceDisconnected("device removed");
        }
        termLog("system", `Device lost: ${removedId || "unknown"}`);
        return;
      }
      if (kind === "connection.established") {
        return; // we handle this in connectToDevice
      }
      if (kind === "connection.lost") {
        onDeviceDisconnected(data.payload?.reason);
        return;
      }

      termLog("event", JSON.stringify(data));
    } catch {
      termLog("event", e.data);
    }
  };

  ws.onopen = () => {
    retryDelay = 1000;
    termLog("system", "Events connected");
  };

  ws.onclose = () => {
    setTimeout(connectEvents, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 10000);
  };

  ws.onerror = () => { /* onclose will fire */ };
}

// ===========================================================================
// Page Init
// ===========================================================================
async function init() {
  setupTerminal();
  setupTerminalResize();
  connectEvents();
  showPlaceholder();

  // Check if there's already a connection (page refresh)
  try {
    const status = await (await fetch("/api/connection")).json();
    if (status.connected) {
      connectedDeviceId = status.device_id;
      connectedDeviceName = status.device_name;
      await onDeviceConnected();
    } else {
      document.getElementById("device-info").textContent = "No device";
      document.getElementById("status-dot").className = "status-dot";
    }
  } catch {
    document.getElementById("device-info").textContent = "No device";
  }

  startDevicePolling();
  termLog("system", "Dashboard ready — select a device to connect");
}

window.addEventListener("DOMContentLoaded", init);
