<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remo Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  video {
    max-width: 100%; max-height: 100%;
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
  }
  #overlay {
    position: fixed; top: 12px; left: 12px;
    font: 13px/1.5 monospace; color: #aaa;
    background: rgba(0,0,0,0.6); padding: 6px 10px;
    border-radius: 4px; pointer-events: none;
    z-index: 10; white-space: pre;
  }
  #overlay.error { color: #f66; }
</style>
</head>
<body>
<video id="video" autoplay muted playsinline></video>
<div id="overlay">Connecting…</div>
<script>
"use strict";

// ---------------------------------------------------------------------------
// Flag constants for the binary frame protocol
// ---------------------------------------------------------------------------
const KEYFRAME     = 0x01;
const STREAM_START = 0x02;
const STREAM_END   = 0x04;
const CODEC_CONFIG = 0x08;

// ---------------------------------------------------------------------------
// DOM references
// ---------------------------------------------------------------------------
const videoEl = document.getElementById("video");
const overlayEl = document.getElementById("overlay");

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let mediaSource = null;
let sourceBuffer = null;
let appendQueue = [];
let appending = false;
let seqNum = 0;
let frameCount = 0;
let fpsFrameCount = 0;
let fps = 0;
let lastFpsTime = performance.now();
let ws = null;
let reconnectTimer = null;
let codecString = "";

// ---------------------------------------------------------------------------
// Status overlay
// ---------------------------------------------------------------------------
function updateOverlay(connState) {
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = fpsFrameCount;
    fpsFrameCount = 0;
    lastFpsTime = now;
  }
  overlayEl.textContent =
    `${connState}  FPS: ${fps}  Frames: ${frameCount}`;
  overlayEl.classList.toggle("error", connState === "Disconnected");
}

// ---------------------------------------------------------------------------
// MP4 box helpers
// ---------------------------------------------------------------------------
function box(type, ...payloads) {
  let size = 8;
  for (const p of payloads) size += p.byteLength;
  const out = new Uint8Array(size);
  const dv = new DataView(out.buffer);
  dv.setUint32(0, size);
  out[4] = type.charCodeAt(0);
  out[5] = type.charCodeAt(1);
  out[6] = type.charCodeAt(2);
  out[7] = type.charCodeAt(3);
  let offset = 8;
  for (const p of payloads) {
    out.set(p instanceof Uint8Array ? p : new Uint8Array(p), offset);
    offset += p.byteLength;
  }
  return out;
}

function fullbox(type, version, flags, ...payloads) {
  const header = new Uint8Array(4);
  header[0] = version;
  header[1] = (flags >> 16) & 0xff;
  header[2] = (flags >> 8) & 0xff;
  header[3] = flags & 0xff;
  return box(type, header, ...payloads);
}

function u8(v)  { return new Uint8Array([v]); }
function u16(v) { const b = new Uint8Array(2); new DataView(b.buffer).setUint16(0, v); return b; }
function u32(v) { const b = new Uint8Array(4); new DataView(b.buffer).setUint32(0, v); return b; }
function u64(v) {
  const b = new Uint8Array(8);
  const dv = new DataView(b.buffer);
  dv.setUint32(0, Math.floor(v / 0x100000000));
  dv.setUint32(4, v >>> 0);
  return b;
}
function zeros(n) { return new Uint8Array(n); }
function concat(...arrays) {
  let len = 0;
  for (const a of arrays) len += a.byteLength;
  const out = new Uint8Array(len);
  let off = 0;
  for (const a of arrays) { out.set(a, off); off += a.byteLength; }
  return out;
}

// ---------------------------------------------------------------------------
// Annex-B NAL splitter
// ---------------------------------------------------------------------------
function splitNals(data) {
  const nals = [];
  let i = 0;
  let start = -1;

  function isStartCode(pos) {
    if (pos + 3 < data.length &&
        data[pos] === 0 && data[pos+1] === 0 && data[pos+2] === 0 && data[pos+3] === 1) {
      return 4;
    }
    if (pos + 2 < data.length &&
        data[pos] === 0 && data[pos+1] === 0 && data[pos+2] === 1) {
      return 3;
    }
    return 0;
  }

  while (i < data.length) {
    const sc = isStartCode(i);
    if (sc > 0) {
      if (start >= 0) {
        nals.push(data.subarray(start, i));
      }
      i += sc;
      start = i;
    } else {
      i++;
    }
  }
  if (start >= 0 && start < data.length) {
    nals.push(data.subarray(start, data.length));
  }
  return nals;
}

// ---------------------------------------------------------------------------
// Exp-Golomb / SPS parser
// ---------------------------------------------------------------------------
class BitReader {
  constructor(data) {
    this.data = data;
    this.bytePos = 0;
    this.bitPos = 0;
  }
  readBit() {
    if (this.bytePos >= this.data.length) return 0;
    const bit = (this.data[this.bytePos] >> (7 - this.bitPos)) & 1;
    this.bitPos++;
    if (this.bitPos === 8) { this.bitPos = 0; this.bytePos++; }
    return bit;
  }
  readBits(n) {
    let val = 0;
    for (let i = 0; i < n; i++) {
      val = (val << 1) | this.readBit();
    }
    return val;
  }
  readUEG() {
    let zeros = 0;
    while (this.readBit() === 0 && zeros < 31) zeros++;
    if (zeros === 0) return 0;
    return (1 << zeros) - 1 + this.readBits(zeros);
  }
  readSEG() {
    const val = this.readUEG();
    if (val === 0) return 0;
    return (val & 1) ? ((val + 1) >>> 1) : -((val + 1) >>> 1);
  }
  skipScalingList(size) {
    let lastScale = 8;
    let nextScale = 8;
    for (let j = 0; j < size; j++) {
      if (nextScale !== 0) {
        const delta = this.readSEG();
        nextScale = (lastScale + delta + 256) % 256;
      }
      lastScale = (nextScale === 0) ? lastScale : nextScale;
    }
  }
}

// Remove emulation prevention bytes (0x00 0x00 0x03 -> 0x00 0x00)
function removeEpb(data) {
  const out = [];
  let i = 0;
  while (i < data.length) {
    if (i + 2 < data.length && data[i] === 0 && data[i+1] === 0 && data[i+2] === 3) {
      out.push(0, 0);
      i += 3;
    } else {
      out.push(data[i]);
      i++;
    }
  }
  return new Uint8Array(out);
}

function parseSPS(nalUnit) {
  // Strip NAL header byte
  const rbsp = removeEpb(nalUnit.subarray(1));
  const br = new BitReader(rbsp);

  const profile_idc = br.readBits(8);
  const constraint_set_flags = br.readBits(8); // constraint_set0..5_flag + reserved
  const level_idc = br.readBits(8);
  br.readUEG(); // seq_parameter_set_id

  let chroma_format_idc = 1;
  let separate_colour_plane_flag = 0;
  let bit_depth_luma = 8;
  let bit_depth_chroma = 8;

  if (profile_idc === 100 || profile_idc === 110 || profile_idc === 122 ||
      profile_idc === 244 || profile_idc === 44  || profile_idc === 83  ||
      profile_idc === 86  || profile_idc === 118 || profile_idc === 128 ||
      profile_idc === 138 || profile_idc === 139 || profile_idc === 134 ||
      profile_idc === 135) {
    chroma_format_idc = br.readUEG();
    if (chroma_format_idc === 3) {
      separate_colour_plane_flag = br.readBits(1);
    }
    bit_depth_luma = br.readUEG() + 8;
    bit_depth_chroma = br.readUEG() + 8;
    br.readBits(1); // qpprime_y_zero_transform_bypass_flag
    const seq_scaling_matrix_present = br.readBits(1);
    if (seq_scaling_matrix_present) {
      const limit = (chroma_format_idc !== 3) ? 8 : 12;
      for (let i = 0; i < limit; i++) {
        const present = br.readBits(1);
        if (present) {
          br.skipScalingList(i < 6 ? 16 : 64);
        }
      }
    }
  }

  br.readUEG(); // log2_max_frame_num_minus4
  const pic_order_cnt_type = br.readUEG();
  if (pic_order_cnt_type === 0) {
    br.readUEG(); // log2_max_pic_order_cnt_lsb_minus4
  } else if (pic_order_cnt_type === 1) {
    br.readBits(1); // delta_pic_order_always_zero_flag
    br.readSEG();   // offset_for_non_ref_pic
    br.readSEG();   // offset_for_top_to_bottom_field
    const n = br.readUEG(); // num_ref_frames_in_pic_order_cnt_cycle
    for (let i = 0; i < n; i++) br.readSEG();
  }

  br.readUEG(); // max_num_ref_frames
  br.readBits(1); // gaps_in_frame_num_value_allowed_flag

  const pic_width_in_mbs_minus1 = br.readUEG();
  const pic_height_in_map_units_minus1 = br.readUEG();
  const frame_mbs_only_flag = br.readBits(1);

  if (!frame_mbs_only_flag) {
    br.readBits(1); // mb_adaptive_frame_field_flag
  }

  br.readBits(1); // direct_8x8_inference_flag

  let cropLeft = 0, cropRight = 0, cropTop = 0, cropBottom = 0;
  const frame_cropping_flag = br.readBits(1);
  if (frame_cropping_flag) {
    cropLeft   = br.readUEG();
    cropRight  = br.readUEG();
    cropTop    = br.readUEG();
    cropBottom = br.readUEG();
  }

  // Chroma subsampling factors for cropping
  let subWidthC = 1, subHeightC = 1;
  if (chroma_format_idc === 1) { subWidthC = 2; subHeightC = 2; }
  else if (chroma_format_idc === 2) { subWidthC = 2; subHeightC = 1; }
  else if (chroma_format_idc === 3 && separate_colour_plane_flag === 0) { subWidthC = 1; subHeightC = 1; }

  const cropUnitX = (chroma_format_idc === 0) ? 1 : subWidthC;
  const cropUnitY = (chroma_format_idc === 0) ? (2 - frame_mbs_only_flag) : subHeightC * (2 - frame_mbs_only_flag);

  const width  = (pic_width_in_mbs_minus1 + 1) * 16 - cropUnitX * (cropLeft + cropRight);
  const height = (2 - frame_mbs_only_flag) * (pic_height_in_map_units_minus1 + 1) * 16 - cropUnitY * (cropTop + cropBottom);

  return {
    profile_idc,
    profile_compat: constraint_set_flags,
    level_idc,
    width,
    height,
    chroma_format_idc,
  };
}

// ---------------------------------------------------------------------------
// Codec string from SPS info
// ---------------------------------------------------------------------------
function makeCodecString(spsInfo) {
  const p = spsInfo.profile_idc.toString(16).padStart(2, "0");
  const c = spsInfo.profile_compat.toString(16).padStart(2, "0");
  const l = spsInfo.level_idc.toString(16).padStart(2, "0");
  return `avc1.${p}${c}${l}`;
}

// ---------------------------------------------------------------------------
// fMP4 init segment builder
// ---------------------------------------------------------------------------
function buildInitSegment(sps, pps) {
  const spsInfo = parseSPS(sps);
  const w = spsInfo.width;
  const h = spsInfo.height;

  codecString = `video/mp4; codecs="${makeCodecString(spsInfo)}"`;
  console.log("Codec:", codecString, `${w}x${h}`);

  // avcC configuration record
  const avcC = box("avcC", new Uint8Array([
    1,                     // configurationVersion
    sps[1],                // AVCProfileIndication
    sps[2],                // profile_compatibility
    sps[3],                // AVCLevelIndication
    0xff,                  // lengthSizeMinusOne = 3 (4 bytes) | reserved 6 bits
    0xe1,                  // numOfSequenceParameterSets = 1 | reserved 3 bits
    (sps.length >> 8) & 0xff, sps.length & 0xff,
    ...sps,
    1,                     // numOfPictureParameterSets
    (pps.length >> 8) & 0xff, pps.length & 0xff,
    ...pps,
  ]));

  // avc1 sample entry
  const avc1Payload = concat(
    zeros(6),              // reserved
    u16(1),                // data_reference_index
    zeros(16),             // pre_defined + reserved
    u16(w),                // width
    u16(h),                // height
    u32(0x00480000),       // horizresolution 72 dpi
    u32(0x00480000),       // vertresolution 72 dpi
    zeros(4),              // reserved
    u16(1),                // frame_count
    zeros(32),             // compressorname
    u16(0x0018),           // depth
    new Uint8Array([0xff, 0xff]),  // pre_defined = -1
    avcC,
  );
  const avc1 = box("avc1", avc1Payload);

  const stsd = fullbox("stsd", 0, 0, u32(1), avc1);
  const stts = fullbox("stts", 0, 0, u32(0));
  const stsc = fullbox("stsc", 0, 0, u32(0));
  const stsz = fullbox("stsz", 0, 0, u32(0), u32(0));
  const stco = fullbox("stco", 0, 0, u32(0));
  const stbl = box("stbl", stsd, stts, stsc, stsz, stco);

  const vmhd = fullbox("vmhd", 0, 1, zeros(8));
  const url  = fullbox("url ", 0, 1);
  const dref = fullbox("dref", 0, 0, u32(1), url);
  const dinf = box("dinf", dref);
  const minf = box("minf", vmhd, dinf, stbl);

  const mdhd = fullbox("mdhd", 0, 0,
    u32(0),                // creation_time
    u32(0),                // modification_time
    u32(90000),            // timescale
    u32(0),                // duration
    u16(0x55c4),           // language = 'und'
    u16(0),                // pre_defined
  );

  const hdlr = fullbox("hdlr", 0, 0,
    u32(0),                // pre_defined
    new Uint8Array([0x76,0x69,0x64,0x65]),  // handler_type 'vide'
    zeros(12),             // reserved
    new Uint8Array([0x56,0x69,0x64,0x65,0x6f,0x48,0x61,0x6e,0x64,0x6c,0x65,0x72,0x00]),  // name "VideoHandler\0"
  );

  const mdia = box("mdia", mdhd, hdlr, minf);

  const tkhd = fullbox("tkhd", 0, 3,
    u32(0),                // creation_time
    u32(0),                // modification_time
    u32(1),                // track_ID
    u32(0),                // reserved
    u32(0),                // duration
    zeros(8),              // reserved
    u16(0),                // layer
    u16(0),                // alternate_group
    u16(0),                // volume
    u16(0),                // reserved
    // unity matrix
    new Uint8Array([
      0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00, 0x40,0x00,0x00,0x00,
    ]),
    u16(w), u16(0),        // width (fixed-point 16.16)
    u16(h), u16(0),        // height (fixed-point 16.16)
  );

  const trak = box("trak", tkhd, mdia);

  const mvhd = fullbox("mvhd", 0, 0,
    u32(0),                // creation_time
    u32(0),                // modification_time
    u32(90000),            // timescale
    u32(0),                // duration
    u32(0x00010000),       // rate = 1.0
    u16(0x0100),           // volume = 1.0
    zeros(10),             // reserved
    // unity matrix
    new Uint8Array([
      0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x01,0x00,0x00, 0x00,0x00,0x00,0x00,
      0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00, 0x40,0x00,0x00,0x00,
    ]),
    zeros(24),             // pre_defined
    u32(2),                // next_track_ID
  );

  const trex = fullbox("trex", 0, 0,
    u32(1),                // track_ID
    u32(1),                // default_sample_description_index
    u32(0),                // default_sample_duration
    u32(0),                // default_sample_size
    u32(0),                // default_sample_flags
  );
  const mvex = box("mvex", trex);

  const moov = box("moov", mvhd, trak, mvex);

  const ftyp = box("ftyp",
    new Uint8Array([0x69,0x73,0x6f,0x6d]),  // major_brand 'isom'
    u32(0x200),            // minor_version
    new Uint8Array([
      0x69,0x73,0x6f,0x6d,  // isom
      0x69,0x73,0x6f,0x32,  // iso2
      0x61,0x76,0x63,0x31,  // avc1
      0x6d,0x70,0x34,0x31,  // mp41
    ]),
  );

  return concat(ftyp, moov);
}

// ---------------------------------------------------------------------------
// fMP4 media segment builder
// ---------------------------------------------------------------------------
function buildMediaSegment(nalData, timestampUs, isKeyframe, seq) {
  // Convert Annex-B NALs to AVCC (4-byte length prefix)
  const nals = splitNals(nalData);
  let avccSize = 0;
  for (const nal of nals) avccSize += 4 + nal.length;
  const avccData = new Uint8Array(avccSize);
  const avccDv = new DataView(avccData.buffer);
  let off = 0;
  for (const nal of nals) {
    avccDv.setUint32(off, nal.length);
    avccData.set(nal, off + 4);
    off += 4 + nal.length;
  }

  const dts90k = Math.floor(timestampUs * 90 / 1000); // microseconds to 90kHz

  // sample_flags: leading(2) | depends_on(2) | depended_on(2) | redundancy(2) | padding(3) | non_sync(1) | degradation(16)
  // keyframe:     0x02000000 (depends_on=2 means does NOT depend on others... actually ISO standard:)
  // For keyframe: sample_depends_on=2 (does not depend), is_non_sync_sample=0
  // For non-key:  sample_depends_on=1 (depends on others), is_non_sync_sample=1
  const sampleFlags = isKeyframe ? 0x02000000 : 0x01010000;

  const sampleDuration = 3000; // ~33ms at 90kHz (~30fps), approximate

  // trun: version=0, flags = data-offset(0x01) | first-sample-flags or sample-flags
  // Use flags: 0x000301 = data-offset-present | sample-duration-present | sample-size-present
  // Plus 0x000400 = first-sample-flags-present? No, let's include per-sample flags.
  // flags: 0x000f01 = data-offset(1) + duration(0x100) + size(0x200) + flags(0x400) ...
  // Actually the trun flags field bits:
  //   0x000001 = data-offset-present
  //   0x000004 = first-sample-flags-present
  //   0x000100 = sample-duration-present
  //   0x000200 = sample-size-present
  //   0x000400 = sample-flags-present
  const trunFlags = 0x000701; // data-offset + sample-duration + sample-size + sample-flags
  const trunPayload = concat(
    u32(1),                // sample_count
    u32(0),                // data_offset (patched below)
    u32(sampleDuration),   // sample_duration
    u32(avccData.length),  // sample_size
    u32(sampleFlags),      // sample_flags
  );
  const trun = fullbox("trun", 0, trunFlags, trunPayload);

  const tfhd = fullbox("tfhd", 0, 0x020000, // default-base-is-moof
    u32(1),                // track_ID
  );

  const tfdt = fullbox("tfdt", 1, 0, u64(dts90k));

  const traf = box("traf", tfhd, tfdt, trun);

  const mfhd = fullbox("mfhd", 0, 0, u32(seq));
  const moof = box("moof", mfhd, traf);

  const mdat = box("mdat", avccData);

  // Patch data_offset in trun to point to start of mdat payload
  // data_offset is relative to the start of the containing moof
  const dataOffset = moof.length + 8; // moof size + mdat header(8)
  // Find data_offset location in trun: it's the first 4 bytes after the fullbox header + sample_count
  // trun is inside traf which is inside moof
  // moof header(8) + mfhd(size) + traf header(8) + tfhd(size) + tfdt(size) + trun header(8) + fullbox(4) + sample_count(4) => data_offset
  const mfhdSize = 8 + 4 + 4; // box(8) + fullbox(4) + sequence_number(4)
  const tfhdSize = 8 + 4 + 4; // box(8) + fullbox(4) + track_id(4)
  const tfdtSize = 8 + 4 + 8; // box(8) + fullbox(4) + baseMediaDecodeTime(8) for version 1
  const trunDataOffsetPos = 8 + mfhdSize + 8 + tfhdSize + tfdtSize + 8 + 4 + 4;
  // 8=moof header, mfhdSize, 8=traf header, tfhdSize, tfdtSize, 8=trun header, 4=fullbox header, 4=sample_count
  const dv = new DataView(moof.buffer);
  dv.setUint32(trunDataOffsetPos, moof.length + 8); // offset to mdat payload (past moof + mdat header)

  return concat(moof, mdat);
}

// ---------------------------------------------------------------------------
// Frame parser
// ---------------------------------------------------------------------------
function parseFrame(buffer) {
  const data = new Uint8Array(buffer);
  if (data.length < 9) return null;
  const flags = data[0];
  const dv = new DataView(buffer);
  const hi = dv.getUint32(1);
  const lo = dv.getUint32(5);
  const timestamp_us = hi * 0x100000000 + lo;
  const nalData = data.subarray(9);
  return { flags, timestamp_us, nalData };
}

// ---------------------------------------------------------------------------
// MSE integration
// ---------------------------------------------------------------------------
function resetMSE() {
  if (sourceBuffer) {
    try {
      if (mediaSource && mediaSource.readyState === "open") {
        mediaSource.removeSourceBuffer(sourceBuffer);
      }
    } catch (e) { /* ignore */ }
    sourceBuffer = null;
  }
  if (mediaSource) {
    try {
      if (mediaSource.readyState === "open") mediaSource.endOfStream();
    } catch (e) { /* ignore */ }
  }
  appendQueue = [];
  appending = false;
  seqNum = 0;

  mediaSource = new MediaSource();
  videoEl.src = URL.createObjectURL(mediaSource);
}

function appendSegment(data) {
  appendQueue.push(data);
  drainQueue();
}

function drainQueue() {
  if (appending || !sourceBuffer || appendQueue.length === 0) return;
  if (sourceBuffer.updating) return;
  appending = true;
  const seg = appendQueue.shift();
  try {
    sourceBuffer.appendBuffer(seg);
  } catch (e) {
    console.error("appendBuffer error:", e);
    appending = false;
  }
}

function onUpdateEnd() {
  appending = false;

  // Buffer management: trim if > 30 seconds buffered
  if (sourceBuffer && !sourceBuffer.updating && sourceBuffer.buffered.length > 0) {
    const buffEnd = sourceBuffer.buffered.end(sourceBuffer.buffered.length - 1);
    const buffStart = sourceBuffer.buffered.start(0);
    if (buffEnd - buffStart > 30) {
      try {
        sourceBuffer.remove(buffStart, buffEnd - 15);
        return; // will call updateend again after remove
      } catch (e) { /* ignore */ }
    }
  }

  drainQueue();
}

function initSourceBuffer(initSegment) {
  if (!mediaSource || mediaSource.readyState !== "open") {
    console.warn("MediaSource not open, deferring init");
    mediaSource.addEventListener("sourceopen", () => initSourceBuffer(initSegment), { once: true });
    return;
  }

  if (!MediaSource.isTypeSupported(codecString)) {
    console.error("Codec not supported:", codecString);
    overlayEl.textContent = "Unsupported codec: " + codecString;
    overlayEl.classList.add("error");
    return;
  }

  sourceBuffer = mediaSource.addSourceBuffer(codecString);
  sourceBuffer.mode = "segments";
  sourceBuffer.addEventListener("updateend", onUpdateEnd);

  appendSegment(initSegment);
}

// ---------------------------------------------------------------------------
// WebSocket connection with reconnect
// ---------------------------------------------------------------------------
function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

  resetMSE();
  updateOverlay("Connecting…");

  const url = `ws://${location.host}/stream`;
  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    console.log("WebSocket connected");
    updateOverlay("Connected");
  };

  ws.onclose = () => {
    console.log("WebSocket closed");
    updateOverlay("Disconnected");
    scheduleReconnect();
  };

  ws.onerror = (e) => {
    console.error("WebSocket error:", e);
    updateOverlay("Disconnected");
  };

  ws.onmessage = (event) => {
    const frame = parseFrame(event.data);
    if (!frame) return;

    const { flags, timestamp_us, nalData } = frame;

    // Stream end
    if (flags & STREAM_END) {
      console.log("Stream ended");
      try {
        if (mediaSource && mediaSource.readyState === "open" && sourceBuffer && !sourceBuffer.updating) {
          mediaSource.endOfStream();
        }
      } catch (e) { /* ignore */ }
      updateOverlay("Stream ended");
      return;
    }

    // Codec config: extract SPS/PPS and build init segment
    if (flags & CODEC_CONFIG) {
      const nals = splitNals(nalData);
      let sps = null, pps = null;
      for (const nal of nals) {
        if (nal.length === 0) continue;
        const nalType = nal[0] & 0x1f;
        if (nalType === 7) sps = nal;
        else if (nalType === 8) pps = nal;
      }
      if (sps && pps) {
        console.log("Got SPS/PPS, building init segment");
        resetMSE();
        const initSeg = buildInitSegment(sps, pps);

        if (mediaSource.readyState === "open") {
          initSourceBuffer(initSeg);
        } else {
          mediaSource.addEventListener("sourceopen", () => initSourceBuffer(initSeg), { once: true });
        }
      }
      return;
    }

    // Regular frame or keyframe
    if (!sourceBuffer) return;

    seqNum++;
    frameCount++;
    fpsFrameCount++;
    const isKey = !!(flags & KEYFRAME);
    const segment = buildMediaSegment(nalData, timestamp_us, isKey, seqNum);
    appendSegment(segment);
    updateOverlay("Connected");
  };
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, 2000);
}

// ---------------------------------------------------------------------------
// Start
// ---------------------------------------------------------------------------
connect();

// Periodically update the overlay for FPS display
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    updateOverlay("Connected");
  }
}, 1000);
</script>
